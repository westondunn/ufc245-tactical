name: Deploy · Version Bump + Railway

on:
  push:
    branches: [main]
    # Don't trigger on version bump commits (prevents infinite loop)
    paths-ignore:
      - 'package.json'
      - 'package-lock.json'

permissions:
  contents: write

jobs:
  version-bump:
    name: Bump Version
    runs-on: ubuntu-latest
    # Skip if the commit message contains [skip-version]
    if: "!contains(github.event.head_commit.message, '[skip-version]')"
    outputs:
      new_version: ${{ steps.bump.outputs.new_version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Determine version bump type
        id: bump_type
        run: |
          MSG="${{ github.event.head_commit.message }}"
          if echo "$MSG" | grep -qi "BREAKING\|major"; then
            echo "type=major" >> $GITHUB_OUTPUT
          elif echo "$MSG" | grep -qi "feat\|feature\|add\|new"; then
            echo "type=minor" >> $GITHUB_OUTPUT
          else
            echo "type=patch" >> $GITHUB_OUTPUT
          fi

      - name: Bump version
        id: bump
        run: |
          BUMP_TYPE=${{ steps.bump_type.outputs.type }}
          CURRENT=$(node -e "console.log(require('./package.json').version)")
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

          case "$BUMP_TYPE" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          NEW_VERSION="$MAJOR.$MINOR.$PATCH"
          echo "Bumping $CURRENT → $NEW_VERSION ($BUMP_TYPE)"
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT

          # Update package.json
          node -e "
            const pkg = require('./package.json');
            pkg.version = '$NEW_VERSION';
            require('fs').writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

          # Update package-lock.json if it exists
          if [ -f package-lock.json ]; then
            node -e "
              const lock = require('./package-lock.json');
              lock.version = '$NEW_VERSION';
              if (lock.packages && lock.packages['']) lock.packages[''].version = '$NEW_VERSION';
              require('fs').writeFileSync('package-lock.json', JSON.stringify(lock, null, 2) + '\n');
            "
          fi

      - name: Commit version bump
        run: |
          NEW_VERSION=${{ steps.bump.outputs.new_version }}
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json
          git commit -m "v${NEW_VERSION} [skip-version]" || echo "No changes to commit"
          git tag "v${NEW_VERSION}"
          git push origin main --tags

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.bump.outputs.new_version }}
          name: v${{ steps.bump.outputs.new_version }}
          body: |
            Automated release from commit ${{ github.sha }}

            **Commit:** ${{ github.event.head_commit.message }}

            **Deploy:** Railway auto-deploys from main branch.
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Railway deploys automatically via GitHub integration — no action needed.
  # This job just verifies the deployment happened.
  verify-deploy:
    name: Verify Railway Deploy
    runs-on: ubuntu-latest
    needs: version-bump
    if: always()
    timeout-minutes: 20
    env:
      RAILWAY_WEB_URL: ${{ secrets.RAILWAY_WEB_URL }}
      RAILWAY_PREDICTIONS_URL: ${{ secrets.RAILWAY_PREDICTIONS_URL }}
      RAILWAY_FUNCTION_URL: ${{ secrets.RAILWAY_FUNCTION_URL }}
      PREDICTION_SERVICE_KEY: ${{ secrets.PREDICTION_SERVICE_KEY }}
    steps:
      - name: Validate required deploy secrets
        run: |
          set -euo pipefail
          for var in RAILWAY_WEB_URL RAILWAY_PREDICTIONS_URL RAILWAY_FUNCTION_URL PREDICTION_SERVICE_KEY; do
            if [ -z "${!var:-}" ]; then
              echo "::error::$var is required for deploy verification"
              exit 1
            fi
          done

      - name: Wait for web + predictions health
        run: |
          set -euo pipefail
          check_health() {
            local url="$1"
            local name="$2"
            local ok=0
            for i in $(seq 1 36); do
              code=$(curl -s -o /tmp/health.json -w "%{http_code}" "$url/healthz" || true)
              if [ "$code" = "200" ]; then
                ok=1
                echo "$name healthy on attempt $i"
                break
              fi
              echo "$name not ready yet (attempt $i/36, status=$code)"
              sleep 10
            done
            if [ "$ok" -ne 1 ]; then
              echo "::error::$name failed health check at $url/healthz"
              exit 1
            fi
          }
          check_health "$RAILWAY_WEB_URL" "web"
          check_health "$RAILWAY_PREDICTIONS_URL" "predictions"

      - name: Verify predictions contract + authenticated triggers
        run: |
          set -euo pipefail

          HEALTH=$(curl -s "$RAILWAY_PREDICTIONS_URL/healthz")
          echo "$HEALTH" | node -e "
            let d=''; process.stdin.on('data', c => d += c); process.stdin.on('end', () => {
              const j = JSON.parse(d);
              if (!j.status || j.status !== 'ok') process.exit(1);
              if (!Object.prototype.hasOwnProperty.call(j, 'scheduler_running')) process.exit(1);
              if (!Object.prototype.hasOwnProperty.call(j, 'deployment_mode')) process.exit(1);
              console.log('predictions health contract OK');
            });
          "

          for route in retrain predict; do
            code=$(curl -s -o /tmp/${route}.json -w "%{http_code}" \
              -X POST "$RAILWAY_PREDICTIONS_URL/trigger/$route" \
              -H "x-prediction-key: $PREDICTION_SERVICE_KEY" \
              -H "Content-Type: application/json")
            if [ "$code" != "200" ]; then
              echo "::error::/trigger/$route failed with HTTP $code"
              cat /tmp/${route}.json || true
              exit 1
            fi
          done
          echo "predictions trigger endpoints OK"

      - name: Verify main app predictions endpoint
        run: |
          set -euo pipefail
          code=$(curl -s -o /tmp/upcoming.json -w "%{http_code}" \
            "$RAILWAY_WEB_URL/api/predictions?upcoming=1&limit=10")
          if [ "$code" != "200" ]; then
            echo "::error::main app /api/predictions failed (HTTP $code)"
            exit 1
          fi
          cat /tmp/upcoming.json | node -e "
            let d=''; process.stdin.on('data', c => d += c); process.stdin.on('end', () => {
              const j = JSON.parse(d);
              if (!Array.isArray(j)) process.exit(1);
              console.log('main app predictions contract OK; rows=' + j.length);
            });
          "

      - name: Verify function orchestration health endpoint
        run: |
          set -euo pipefail
          code=$(curl -s -o /tmp/function-health.json -w "%{http_code}" \
            "$RAILWAY_FUNCTION_URL/api/health")
          if [ "$code" != "200" ]; then
            echo "::error::function health endpoint failed (HTTP $code)"
            cat /tmp/function-health.json || true
            exit 1
          fi
          cat /tmp/function-health.json | node -e "
            let d=''; process.stdin.on('data', c => d += c); process.stdin.on('end', () => {
              const j = JSON.parse(d);
              if (!Object.prototype.hasOwnProperty.call(j, 'predictions')) process.exit(1);
              if (!Object.prototype.hasOwnProperty.call(j, 'main')) process.exit(1);
              if (j.predictions !== 200 || j.main !== 200) process.exit(1);
              console.log('function health contract OK');
            });
          "
