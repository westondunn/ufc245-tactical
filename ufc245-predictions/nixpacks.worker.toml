# Nixpacks config for predictions worker service (API runtime with scheduler enabled)

[phases.setup]
nixPkgs = ["python312", "python312Packages.pip"]

[phases.install]
cmds = [
  "pip --version",
  "if [ -f requirements.txt ]; then pip install --break-system-packages -r requirements.txt; else pip install --break-system-packages -r ufc245-predictions/requirements.txt; fi"
]

[phases.build]
cmds = ["if [ -f app.py ]; then python3 -m compileall .; else python3 -m compileall ufc245-predictions/; fi"]

[start]
cmd = "if [ -f app.py ]; then python3 -m uvicorn app:app --host 0.0.0.0 --port ${PORT:-8000}; else cd ufc245-predictions && python3 -m uvicorn app:app --host 0.0.0.0 --port ${PORT:-8000}; fi"
