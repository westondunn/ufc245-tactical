# Nixpacks config for the predictions microservice
# Railway uses this to build from the monorepo root

[phases.setup]
nixPkgs = ["python313"]

[phases.install]
cmds = ["pip install -r ufc245-predictions/requirements.txt"]

[phases.build]
cmds = ["python -m compileall ufc245-predictions/"]

[start]
cmd = "cd ufc245-predictions && uvicorn app:app --host 0.0.0.0 --port ${PORT:-8000}"
